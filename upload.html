<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Video - TikTok Scheduler</title>
</head>

<body>

    <h1>Upload Video</h1>

    <p>
        Upload a video to prepare it for publishing on your connected TikTok account.
    </p>

    <hr>

    <h2>Select Video</h2>

    <input type="file" accept="video/*">

    <hr>

    <h2>Caption</h2>

    <textarea rows="6" cols="60"
        placeholder="Write your TikTok caption here..."></textarea>

    <hr>

    <h2>Hashtags</h2>

    <input type="text"
        placeholder="#viral #fyp #tiktok">

    <hr>

    <h2>Privacy</h2>

    <select>

        <option>Public</option>

        <option>Friends</option>

        <option>Only Me</option>

    </select>

    <hr>

    <h2>Schedule Date & Time</h2>

    <input type="datetime-local">

    <hr>

    <button>Generate AI Caption</button>

    <button>Generate AI Hashtags</button>

    <button>Schedule Video</button>

    <hr>

    <a href="dashboard.html">← Back to Dashboard</a>

    <hr>

    <footer>

        <p>© 2026 TikTok Scheduler</p>

        <p>
            TikTok Scheduler is an independent application and is not affiliated with or endorsed by TikTok.
        </p>

    </footer>

</body>

</html>
